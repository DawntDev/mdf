# -----------------------------------------------------------------------------
# Nginx server block for the MDF Dictionary Extractor web client.
#
# Responsibilities:
#   * Serve the Vite-built SPA from /usr/share/nginx/html.
#   * Rewrite unknown routes to index.html so client-side routing works.
#   * Reverse-proxy every /api/ request to the FastAPI service on the
#     internal compose network (service name: "api", port 8000).
# -----------------------------------------------------------------------------

server {
    listen       80;
    server_name  _;

    root   /usr/share/nginx/html;
    index  index.html;

    # Large PDFs: match the MAX_UPLOAD_MB default (50 MB) with some headroom.
    client_max_body_size 64m;

    # ----- Gzip: cheap win for JS/CSS/JSON -----------------------------------
    gzip on;
    gzip_types text/plain text/css application/json application/javascript
               application/xml text/xml image/svg+xml;
    gzip_min_length 1024;

    # ----- Static assets (cache-bust by filename hash) -----------------------
    location /assets/ {
        try_files $uri =404;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # ----- API reverse proxy -------------------------------------------------
    # /api/v1/extract uploads multipart bodies; generous timeouts because a
    # multi-page extraction runs synchronously on the current build.
    location /api/ {
        proxy_pass         http://api:8000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 600s;
        proxy_send_timeout 600s;
        proxy_request_buffering off;
    }

    # ----- SPA fallback ------------------------------------------------------
    location / {
        try_files $uri $uri/ /index.html;
    }
}
